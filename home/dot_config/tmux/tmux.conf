# ╭──────────────────────────────────────────────────────────╮
# │                           plugins                        │
# ╰──────────────────────────────────────────────────────────╯
# Prefer manual loading rather than Tmux Plugin Manager
##Apperance [tmux-themepack]
##source-file ${XDG_CONFIG_HOME}/tmux/plugins/tmux-themepack/powerline/block/orange.tmuxtheme
set -g @tmux_power_theme 'snow'
run-shell ${XDG_CONFIG_HOME}/tmux/plugins/tmux-power/tmux-power.tmux

## Plugins
set -g @resurrect-capture-pane-contents 'on' #enable restoring pane contents
run-shell ${XDG_CONFIG_HOME}/tmux/plugins/tmux-resurrect/resurrect.tmux # persist tmux sessions after computer restart

set -g @continuum-boot 'on' #enable tmux-continuum in systemd
run-shell ${XDG_CONFIG_HOME}/tmux/plugins/tmux-continuum/continuum.tmux # automatically saves sessions for you every 15 minutes

# `prefix` + `space`
set -g @thumbs-position off_left
set -g @thumbs-osc52 0 # 1 allows the content to be copied into the system clipboard in addition to the tmux copy buffer.
set -g @thumbs-command 'tmux set-buffer -w "{}"'
set -g @thumbs-upcase-command 'tmux set-buffer -w "{}" && tmux paste-buffer'
set -g @thumbs-fg-color '#11111b'
set -g @thumbs-bg-color '#f5e0dc'
set -g @thumbs-hint-fg-color '#d20f39'
set -g @thumbs-hint-bg-color '#f5e0dc'
set -g @thumbs-regexp-1 '(\S+\.nc)'
run-shell ${XDG_CONFIG_HOME}/tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# ╭──────────────────────────────────────────────────────────╮
# │                           options                        │
# ╰──────────────────────────────────────────────────────────╯
# Bind keys ` and C-a
unbind C-b
set -g prefix `
bind ` send-prefix
set -g prefix2 C-a
bind C-a send-prefix -2

# Set default shell in tmux
#set -g default-shell zsh

# Mouse mode, enable window and panes clickable
set -g mouse on

# Set true colors
set -g default-terminal "screen-256color" #Important for display images in tmux
#set-option -ga terminal-overrides ",*256col*:Tc"

# needed by yazi, imgcat and yank in tmux
set-option -g allow-passthrough on
#set -ga update-environment TERM
#set -ga update-environment TERM_PROGRAM

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf resourced'

# Display
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g status-interval 10     # redraw status line every 10 seconds

# Clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Improve performance 
set -g visual-activity off
set -g visual-bell off
set -g visual-silence on

# ╭──────────────────────────────────────────────────────────╮
# │                           session                        │
# ╰──────────────────────────────────────────────────────────╯
# create session
bind C-c new-session

# find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# ╭──────────────────────────────────────────────────────────╮
# │                           window                         │
# ╰──────────────────────────────────────────────────────────╯
# create a new window
bind c  new-window -c "#{pane_current_path}"
# kill window
bind ^q kill-window    # (prefix ^q)
setw -g automatic-rename off   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

# windows navigation
#unbind n
#unbind p
#bind p previous-window # select previous window
#bind n next-window     # select next window
#bind Tab last-window   # move to last active window


# ╭──────────────────────────────────────────────────────────╮
# │                           pane                           │
# ╰──────────────────────────────────────────────────────────╯
set  -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1      # make pane numbering consistent with windows

# split panes
unbind '"'
bind - splitw -v -c "#{pane_current_path}" #vertical split (prefix -)
unbind %
bind | splitw -h -c "#{pane_current_path}" #horizontal split (prefix |)

bind q display-panes
bind a set-window-option synchronize-panes #synchronize-panes
bind -n M-O next-layout

# pane navigation
## Use bindkey h/j/k/l to navigate panes
bind k select-pane -U  # move up
bind j select-pane -D  # move down
bind h select-pane -L  # move left
bind l select-pane -R  # move right
## Swap panes
bind ^d swap-pane -D   # swap current pane with the next one
bind ^u swap-pane -U   # swap current pane with the previous one
## pane resizing
bind -r ^k resize-pane -U 5 # upward (prefix Ctrl+k)
bind -r ^j resize-pane -D 5 # downward (prefix Ctrl+j)
bind -r ^h resize-pane -L 5 # to the left (prefix Ctrl+h)
bind -r ^l resize-pane -R 5 # to the right (prefix Ctrl+l)
bind -n S-Up    resize-pane -U 5 # upward (Shift+up)
bind -n S-Down  resize-pane -D 5 # downward
bind -n S-Left  resize-pane -L 5 # to the left
bind -n S-Right resize-pane -R 5 # to the right

# ╭──────────────────────────────────────────────────────────╮
# │                           cope mode                      │
# ╰──────────────────────────────────────────────────────────╯
bind Enter copy-mode # enter copy mode
set-window-option -g mode-keys vi #vi mode

bind-key -T copy-mode-vi 'v'   send -X begin-selection            # start selecting text with "v"
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle           # start rectangle selecting text with "Ctrl + v"
bind-key -T copy-mode-vi 'y'   send -X copy-selection-and-cancel  # copy text with "y"

bind-key -T copy-mode-vi f send-keys -X search-forward  "❯"
bind-key -T copy-mode-vi b send-keys -X search-backward "❯"

## Buffers
bind b list-buffers  # list paste buffers
bind p paste-buffer  # paste from the top paste buffer
bind P choose-buffer # choose which buffer to paste from
